<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #1f2937;
        }

        .container {
            text-align: center;
            background-color: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            max-width: 90%;
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 0.5rem;
            max-height: 70vh;
            display: block;
            margin: 0 auto 1.5rem auto;
        }

        p.message {
            font-size: 1.125rem;
            color: #374151;
            line-height: 1.6;
            margin: 0;
            text-align: justify;
        }
    </style>
</head>

<body>
    <div class="container">
        <img src="profile.jpg" alt="Profile Picture">
        <p class="message">Lorem ipsum dolor, sit amet consectetur adipisicing elit. Possimus, explicabo dicta expedita doloribus rem
            est assumenda, nam tempore ipsa illo itaque repudiandae ea obcaecati beatae velit corporis commodi, voluptas
            corrupti?</p>
    </div>
</body>

</html>
