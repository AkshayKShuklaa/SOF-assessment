<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #1f2937;
        }

        .container {
            text-align: center;
            background-color: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            max-width: 90%;
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 0.5rem;
            max-height: 70vh;
            display: block;
            margin: 0 auto 1.5rem auto;
        }

        @keyframes warningPulse {
            0% {
                color: #dc2626;
                opacity: 1;
                transform: scale(1);
            }

            50% {
                color: #ef4444;
                opacity: 0.8;
                transform: scale(1.02);
            }

            100% {
                color: #dc2626;
                opacity: 1;
                transform: scale(1);
            }
        }

        p.message {
            font-size: 1.125rem;
            color: #dc2626;
            line-height: 1.6;
            margin: 0;
            text-align: justify;
            font-weight: bold;
            animation: warningPulse 1.5s infinite ease-in-out;
            border: 2px dashed #ef4444;
            padding: 1rem;
            border-radius: 0.5rem;
            background-color: #fef2f2;
        }
    </style>
</head>

<body>
    <div class="container">
        <img src="profile.jpg" alt="Profile Picture">
        <p class="message">BEAWARE OF THIS BULLDOG BEFORE MAKING ANY PAYMENT OR WORKING FOR HIM HE IS COMPLETELY A FRAUD
            AND A DIGITAL
            THEIF</p>
    </div>
</body>

</html>
