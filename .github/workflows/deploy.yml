name: Deploy Frontend to cPanel via FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: npm ci
      working-directory: ./frontend
      
    - name: Build project
      run: npm run build
      working-directory: ./frontend
      
    - name: List dist directory
      run: ls -la ./frontend/dist/
      
    - name: Sync files via FTP (First Website)
      run: |
        sudo apt-get update && sudo apt-get install -y lftp
        lftp -c "set ftp:ssl-allow no; open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }}; mirror -R --delete ./frontend/dist/ ./"

    - name: Sync files via FTP (Second Website)
      run: |
        lftp -c "set ftp:ssl-allow no; open -u soffuture,'Hellosof@123' ftp.soffuture.club; mirror -R --delete ./frontend/dist/ ./"
